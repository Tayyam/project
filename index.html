<html lang="ar" dir="rtl">
<head>

  <title>مركز الصيانة الذكي المتكامل | Mining Repair Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <style>
    :root {
      --bg:        #0a0d14;
      --bg2:       #0f1420;
      --bg3:       #141a28;
      --border:    #1e2a44;
      --accent:    #f59e0b;
      --accent2:   #3b82f6;
      --accent3:   #10b981;
      --accent4:   #ef4444;
      --text:      #e2e8f0;
      --text-muted:#94a3b8;
      --glow:      0 0 20px rgba(245,158,11,.25);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Cairo', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
    }

    /* ─── SCROLLBAR ─── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 3px; }

    /* ─── HEADER ─── */
    header {
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, #0a0d14 0%, #0d1b30 50%, #0a0d14 100%);
      border-bottom: 1px solid var(--border);
      padding: 80px 20px 60px;
      text-align: center;
    }
    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 50%, rgba(245,158,11,.08) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 80% 50%, rgba(59,130,246,.08) 0%, transparent 70%);
    }
    .header-grid-lines {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(245,158,11,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(245,158,11,.04) 1px, transparent 1px);
      background-size: 60px 60px;
    }
    .header-content { position: relative; z-index: 1; }
    .header-badge {
      display: inline-block;
      background: rgba(245,158,11,.12);
      border: 1px solid rgba(245,158,11,.4);
      color: var(--accent);
      font-size: .75rem;
      letter-spacing: .15em;
      padding: 4px 16px;
      border-radius: 20px;
      margin-bottom: 20px;
      font-family: 'Orbitron', monospace;
    }
    .header-title {
      font-size: clamp(1.8rem, 5vw, 3.2rem);
      font-weight: 900;
      line-height: 1.2;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #f59e0b 0%, #fbbf24 50%, #f59e0b 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header-subtitle {
      font-size: 1rem;
      color: var(--text-muted);
      margin-bottom: 30px;
    }
    .model-tags { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .model-tag {
      background: rgba(59,130,246,.12);
      border: 1px solid rgba(59,130,246,.3);
      color: #93c5fd;
      padding: 5px 14px;
      border-radius: 6px;
      font-size: .8rem;
      font-family: 'Orbitron', monospace;
    }

    /* ─── NAV TABS ─── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10,13,20,.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      overflow-x: auto;
      white-space: nowrap;
    }
    nav::-webkit-scrollbar { height: 2px; }
    .nav-inner { display: flex; gap: 0; min-width: max-content; }
    .nav-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      padding: 14px 20px;
      font-family: 'Cairo', sans-serif;
      font-size: .88rem;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all .25s;
    }
    .nav-btn:hover { color: var(--text); }
    .nav-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* ─── MAIN ─── */
    main { max-width: 1200px; margin: 0 auto; padding: 40px 20px 80px; }

    /* ─── SECTION ─── */
    section { display: none; animation: fadeIn .4s ease; }
    section.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

    .section-heading {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }
    .section-heading .icon {
      width: 40px; height: 40px;
      background: rgba(245,158,11,.12);
      border: 1px solid rgba(245,158,11,.3);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem;
      flex-shrink: 0;
    }
    .section-heading h2 { font-size: 1.4rem; font-weight: 700; }
    .section-heading h2 span { color: var(--accent); }

    /* ─── CARDS ─── */
    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      margin-bottom: 20px;
      transition: border-color .25s;
    }
    .card:hover { border-color: rgba(245,158,11,.3); }
    .card-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ─── GRID ─── */
    .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
    .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; }
    .grid-4 { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; }

    /* ─── STAT CARDS ─── */
    .stat-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 22px 20px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .stat-card::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 3px;
      border-radius: 0 0 14px 14px;
    }
    .stat-card.amber::after  { background: linear-gradient(90deg, var(--accent), #fbbf24); }
    .stat-card.blue::after   { background: linear-gradient(90deg, var(--accent2), #60a5fa); }
    .stat-card.green::after  { background: linear-gradient(90deg, var(--accent3), #34d399); }
    .stat-card.red::after    { background: linear-gradient(90deg, var(--accent4), #f87171); }
    .stat-card .stat-label { font-size: .78rem; color: var(--text-muted); margin-bottom: 8px; }
    .stat-card .stat-value { font-size: 1.6rem; font-weight: 800; }
    .stat-card.amber .stat-value  { color: var(--accent); }
    .stat-card.blue .stat-value   { color: #60a5fa; }
    .stat-card.green .stat-value  { color: #34d399; }
    .stat-card.red .stat-value    { color: #f87171; }
    .stat-card .stat-sub { font-size: .75rem; color: var(--text-muted); margin-top: 4px; }

    /* ─── TABLE ─── */
    .table-wrap { overflow-x: auto; border-radius: 12px; border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; font-size: .88rem; }
    thead th {
      background: var(--bg3);
      padding: 12px 16px;
      text-align: right;
      font-weight: 700;
      color: var(--accent);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    tbody tr { border-bottom: 1px solid var(--border); transition: background .2s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(245,158,11,.04); }
    tbody td { padding: 11px 16px; color: var(--text); }
    tbody td.mono { font-family: 'Orbitron', monospace; font-size: .8rem; }
    tbody td.green { color: #34d399; font-weight: 700; }
    tbody td.amber { color: var(--accent); font-weight: 700; }
    tbody td.blue  { color: #60a5fa; font-weight: 700; }

    /* ─── WORKFLOW STEPS ─── */
    .workflow-list { display: flex; flex-direction: column; gap: 16px; }
    .workflow-step {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px 22px;
      display: flex;
      gap: 18px;
      align-items: flex-start;
      transition: border-color .25s, transform .25s;
    }
    .workflow-step:hover { border-color: rgba(245,158,11,.4); transform: translateX(-4px); }
    .step-num {
      width: 42px; height: 42px;
      background: rgba(245,158,11,.12);
      border: 1px solid rgba(245,158,11,.35);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Orbitron', monospace;
      font-weight: 700;
      color: var(--accent);
      font-size: .9rem;
      flex-shrink: 0;
    }
    .step-body h3 { font-size: 1rem; font-weight: 700; margin-bottom: 4px; }
    .step-body p  { font-size: .85rem; color: var(--text-muted); }

    /* ─── STAT NOTE ─── */
    .stat-note {
      font-size: .7rem;
      color: #34d399;
      margin-top: 2px;
    }

    /* ─── BADGE ─── */
    .badge-better {
      display: inline-block;
      background: linear-gradient(135deg, #10b981, #059669);
      color: #fff;
      font-size: .65rem;
      font-weight: 800;
      padding: 2px 8px;
      border-radius: 20px;
      letter-spacing: .05em;
      margin-right: 4px;
      vertical-align: middle;
    }
    .price-old {
      text-decoration: line-through;
      color: var(--text-muted);
      font-size: .75rem;
      display: block;
      margin-top: 2px;
    }
    .saving-tag {
      color: #34d399;
      font-size: .72rem;
      font-weight: 700;
    }

    /* ─── KNOWLEDGE BASE (Markdown) ─── */
    .md-kb {
      padding: 22px 26px 32px;
      text-align: left;
      font-size: 0.88rem;
      line-height: 1.75;
      color: var(--text);
      overflow-x: auto;
    }
    .md-kb h1 { font-size: 1.65rem; color: var(--accent); margin: 1.2em 0 0.5em; border-bottom: 1px solid var(--border); padding-bottom: 0.25em; }
    .md-kb h2 { font-size: 1.25rem; color: #93c5fd; margin: 1.5em 0 0.45em; }
    .md-kb h3 { font-size: 1.05rem; color: #e2e8f0; margin: 1.1em 0 0.35em; }
    .md-kb h4 { font-size: 0.95rem; color: var(--text-muted); margin: 1em 0 0.3em; }
    .md-kb p { margin: 0.55em 0; color: var(--text-muted); }
    .md-kb ul, .md-kb ol { margin: 0.5em 0 0.5em 1.25em; padding: 0; color: var(--text-muted); }
    .md-kb li { margin: 0.25em 0; }
    .md-kb hr { border: none; border-top: 1px solid var(--border); margin: 1.5em 0; }
    .md-kb code { font-family: ui-monospace, monospace; background: var(--bg3); padding: 0.12em 0.35em; border-radius: 4px; font-size: 0.86em; color: #fdba74; }
    .md-kb pre { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; overflow-x: auto; margin: 0.85em 0; }
    .md-kb pre code { background: none; padding: 0; color: #a5b4fc; font-size: 0.82rem; }
    .md-kb blockquote { border-left: 3px solid var(--accent); margin: 0.75em 0; padding: 0.35em 0 0.35em 1em; background: rgba(245,158,11,.06); color: #fcd34d; }
    .md-kb table { width: 100%; border-collapse: collapse; margin: 1em 0; font-size: 0.82rem; }
    .md-kb th, .md-kb td { border: 1px solid var(--border); padding: 8px 10px; text-align: left; }
    .md-kb th { background: var(--bg3); color: var(--accent); font-weight: 700; }
    .md-kb a { color: #6ee7b7; word-break: break-word; }
    .md-kb strong { color: var(--text); }

    /* ─── P&L BOX ─── */
    .pl-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
      font-size: .93rem;
    }
    .pl-row:last-child { border-bottom: none; }
    .pl-row.total {
      font-weight: 800;
      font-size: 1.05rem;
      padding-top: 16px;
      border-top: 2px solid rgba(245,158,11,.4);
      border-bottom: none;
    }
    .pl-label { color: var(--text-muted); }
    .pl-label.strong { color: var(--text); font-weight: 600; }
    .pl-value.pos { color: #34d399; }
    .pl-value.neg { color: #f87171; }
    .pl-value.net { color: var(--accent); font-size: 1.2rem; }

    /* ─── ROI ─── */
    .roi-bar-wrap { background: var(--bg3); border-radius: 8px; height: 14px; overflow: hidden; margin-top: 6px; }
    .roi-bar { height: 100%; border-radius: 8px; background: linear-gradient(90deg, var(--accent3), #6ee7b7); transition: width 1.2s ease; }

    /* ─── CAPEX LIST ─── */
    .capex-item {
      display: flex; justify-content: space-between;
      padding: 10px 0; border-bottom: 1px solid var(--border);
      font-size: .9rem;
    }
    .capex-item:last-child { border-bottom: none; }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 640px) {
      .workflow-step { flex-direction: column; gap: 10px; }
      .step-num { width: 34px; height: 34px; font-size: .78rem; }
    }
  </style>
</head>

  btn.textContent = nav.label;

  btn.onclick = () => switchTab(nav.id);

});

function switchTab(id) {
  document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const sec = document.getElementById(id);
  if (sec) sec.classList.add('active');
  document.querySelector(`[data-target="${id}"]`)?.classList.add('active');
  if (id === 'roi') animateRoiBars();
}

/* ── Knowledge Base: hub + nested .md under asic_repair_kb/ ── */
(function setupKnowledgeBase() {
  const kb = DATA.knowledgeBase;
  const root = document.getElementById('kbRoot');
  const status = document.getElementById('kbStatus');
  const toolbar = document.getElementById('kbToolbar');
  const btnBack = document.getElementById('kbBackHub');
  if (!root || !status) return;

  const hubPath = kb.file;
  const failMsg =
    '<p style="color:#fca5a5;margin:0;line-height:1.85">لم يُفتح <code style="color:#fdba74">' +
    hubPath +
    '</code> أو أحد المكوّنات. شغّل الصفحة عبر <strong>خادم محلي</strong> من جذر المشروع (مجلد يحتوي <code>index.html</code> و <code>asic_repair_kb/</code>). <code>file://</code> لا يكفي لجلب الـ Markdown.</p>';

  if (typeof marked === 'undefined' || typeof marked.parse !== 'function') {
    status.innerHTML = '<div style="padding:4px 0"><p style="color:#f87171;margin:0">تعذّر تحميل مكتبة <code>marked</code> من CDN.</p></div>';
    return;
  }
  if (typeof marked.use === 'function') marked.use({ gfm: true });

  function setToolbar(isSubPage) {
    if (toolbar) toolbar.style.display = isSubPage ? 'block' : 'none';
  }

  function renderMd(text, path) {
    root.innerHTML = marked.parse(text);
    root.hidden = false;
    status.style.display = 'none';
    setToolbar(path !== hubPath);
  }

  function loadMd(path, pushHistory) {
    return fetch(path, { cache: 'no-store' })
      .then(function (r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.text();
      })
      .then(function (md) {
        renderMd(md, path);
        if (pushHistory) history.pushState({ kbPath: path }, '', '');
      });
  }

  root.addEventListener('click', function (e) {
    const a = e.target.closest('a');
    if (!a || !root.contains(a)) return;
    const href = a.getAttribute('href');
    if (!href || href.startsWith('http://') || href.startsWith('https://') || href.startsWith('mailto:') || href.startsWith('#')) return;
    if (!href.endsWith('.md')) return;
    e.preventDefault();
    loadMd(href, true).catch(function () {
      alert('تعذّر فتح الملف:\n' + href);
    });
  });

  if (btnBack) {
    btnBack.addEventListener('click', function () {
      loadMd(hubPath, false).then(function () {
        history.replaceState({ kbPath: hubPath }, '', '');
      }).catch(function () {});
    });
  }

  window.addEventListener('popstate', function (ev) {
    var path = (ev.state && ev.state.kbPath) || hubPath;
    loadMd(path, false).catch(function () {
      loadMd(hubPath, false).catch(function () {});
    });
  });

  history.replaceState({ kbPath: hubPath }, '', '');
  loadMd(hubPath, false).catch(function () {
    status.innerHTML = '<div style="padding:4px 0">' + failMsg + '</div>';
  });
})();
